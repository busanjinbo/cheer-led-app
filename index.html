<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slogan LED Board</title>
    <link rel="stylesheet" href="index.css?v=3">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <!-- GSAP for Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
    <!-- 16:9 Ratio Container -->
    <div id="app">
        <!-- Background elements -->
        <div class="ambient-light"></div>
        <div class="stars"></div>

        <!-- Flash overlay for the cinematic finale transition -->
        <div id="flash-overlay"></div>

        <!-- Combined container for base.png & light_stick.png (centered, height 100%) -->
        <div id="combined-container">
            <div id="torch-glow"></div>
            <img id="base-image" src="base.png" alt="Base Statue">
            <img id="source-image" src="light_stick.png" alt="Light Stick">
        </div>

        <!-- Small corner QR code (visible from the start, top-right) -->
        <div id="corner-qr">
            <p>참여하기 ✨</p>
            <div class="qr-box-small">
                <!-- Points to local server for testing -->
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://busanjinbo.github.io/cheer-led-app/form.html" alt="QR Code">
            </div>
        </div>

        <!-- Debug controls (1 row, t1 and t100) -->
        <div id="debug-controls">
            <button id="btn-simulate">t1</button>
            <button id="btn-fill">t100</button>
        </div>

        <!-- Interactive buttons (top-right corner, below/adjacent to corner-qr) -->
        <div id="action-controls">
            <!-- 100 messages complete button (icon-only glowing circle) -->
            <button id="complete-btn" class="icon-btn glow-btn" aria-label="Complete event">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="btn-svg">
                    <circle cx="12" cy="12" r="9"></circle>
                </svg>
            </button>
            <!-- Shift & Slide Arrow button (icon-only arrow) -->
            <button id="arrow-btn" class="icon-btn arrow-btn" aria-label="Next slide">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="btn-svg">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>
        </div>

        <!-- Slides container for 1.png and 2.png (spawns on the left side) -->
        <div id="slide-container">
            <img id="slide-img-1" class="slide-img" src="1.png" alt="Slide 1">
            <img id="slide-img-2" class="slide-img" src="2.png" alt="Slide 2">
        </div>

        <!-- Flying messages container -->
        <div id="messages-container"></div>
        
    </div>

    <!-- Firebase SDK & Custom script (Non-module to prevent file:// CORS error) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="main.js?v=3"></script>
</body>
</html>
