<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>규탄 구호 보내기</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #050508; 
            color: white; 
            font-family: 'Outfit', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background: radial-gradient(circle at 50% 0%, rgba(0, 212, 255, 0.15) 0%, #050508 60%);
        }
        .form-container { 
            width: 90%; 
            max-width: 400px; 
            background: rgba(255,255,255,0.03); 
            backdrop-filter: blur(20px);
            padding: 30px; 
            border-radius: 24px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); 
            border: 1px solid rgba(255,255,255,0.05); 
        }
        h2 { 
            text-align: center; 
            margin-bottom: 25px; 
            font-weight: 700;
            background: linear-gradient(90deg, #fff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        input, textarea { 
            width: 100%; 
            box-sizing: border-box; 
            background: rgba(0,0,0,0.3); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: white; 
            padding: 16px; 
            border-radius: 12px; 
            margin-bottom: 16px; 
            font-family: inherit; 
            font-size: 16px; 
            transition: all 0.3s;
        }
        input:focus, textarea:focus { 
            outline: none; 
            border-color: #00d4ff; 
            background: rgba(0,0,0,0.5);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }
        button { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(135deg, #00d4ff, #ff0096); 
            border: none; 
            border-radius: 12px; 
            color: white; 
            font-weight: 700; 
            font-size: 18px; 
            cursor: pointer; 
            transition: transform 0.2s, box-shadow 0.2s; 
        }
        button:active { 
            transform: scale(0.98); 
        }
        button:hover {
            box-shadow: 0 5px 20px rgba(255, 0, 150, 0.4);
        }
        .status {
            text-align: center;
            margin-top: 20px;
            color: #00d4ff;
            font-weight: 500;
            display: none;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>미국 · 일본 규탄 구호 쓰기</h2>
        <input type="text" id="name" placeholder="이름 (닉네임)" required>
        <input type="text" id="message" placeholder="20자 이내의 구호를 입력하세요" maxlength="20" required>
        <div id="char-counter" style="text-align: right; font-size: 0.85rem; color: #a1a1aa; margin-top: -10px; margin-bottom: 16px; padding-right: 4px;">0 / 20</div>
        <button id="submit-btn">강제징용노동자상에게 전하기 ✨</button>
        <p id="status" class="status">전송 완료! 메인 화면을 확인하세요.</p>
    </div>

    <!-- Firebase SDK (Compat version to support older browser setups) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script>
        // Character counter logic
        const messageInput = document.getElementById('message');
        const charCounter = document.getElementById('char-counter');
        messageInput.addEventListener('input', () => {
            charCounter.innerText = `${messageInput.value.length} / 20`;
        });

        // Initialize Firebase
        const firebaseConfig = {
          apiKey: "AIzaSyAiQMuHLrNxwOXgbw64-Hh7rceeRt9N-Ws",
          authDomain: "cheer-led-app.firebaseapp.com",
          databaseURL: "https://cheer-led-app-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "cheer-led-app",
          storageBucket: "cheer-led-app.firebasestorage.app",
          messagingSenderId: "901449615588",
          appId: "1:901449615588:web:923eb803a4fb17882584f1",
          measurementId: "G-H1FTX6CL0F"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const messagesRef = db.ref('messages');

        document.getElementById('submit-btn').addEventListener('click', () => {
            const name = document.getElementById('name').value.trim();
            const text = document.getElementById('message').value.trim();
            
            if(!name || !text) {
                alert('이름과 메시지를 모두 입력해주세요.');
                return;
            }
            
            // Push message to Firebase Realtime Database
            messagesRef.push({
                name: name,
                text: text,
                timestamp: Date.now()
            }).then(() => {
                showSuccess();
            }).catch((err) => {
                console.warn("Failed to push to Firebase, falling back to local BroadcastChannel: ", err);
                
                // Fallback for offline testing via BroadcastChannel
                try {
                    const bc = new BroadcastChannel('cheer_channel');
                    bc.postMessage({ name: name, text: text });
                } catch (e) {
                    console.warn("BroadcastChannel is also blocked: ", e);
                }
                showSuccess();
            });
        });
        
        function showSuccess() {
            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('status').style.display = 'block';
            
            // 입력창 초기화
            document.getElementById('name').value = '';
            document.getElementById('message').value = '';
            charCounter.innerText = '0 / 20';
            
            // 3초 후 다시 전송 버튼 표시
            setTimeout(() => {
                document.getElementById('status').style.display = 'none';
                document.getElementById('submit-btn').style.display = 'block';
            }, 3000);
        }
    </script>
</body>
</html>
